<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>BossFightRPG</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#0a0a1a;font-family:'Segoe UI',Arial,sans-serif;touch-action:none;user-select:none}
canvas{display:block}
#hud{position:fixed;top:0;left:0;right:0;pointer-events:none;z-index:10}
#boss-info{position:absolute;top:12px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:10px;opacity:0;transition:opacity .5s}
#boss-info.v{opacity:1}
#boss-avatar{width:44px;height:44px;border-radius:50%;border:2px solid #8b0000;background:radial-gradient(#2a1a2a,#0a0a0a);display:flex;align-items:center;justify-content:center;font-size:22px}
#boss-details{display:flex;flex-direction:column;gap:2px}
#boss-name{color:#ff4444;font-size:18px;font-weight:bold;text-shadow:0 0 6px rgba(255,0,0,.4)}
#boss-level{color:#aaa;font-size:13px}
#boss-hp-bar{width:300px;height:16px;background:#1a0a0a;border:1px solid #550000;border-radius:8px;overflow:hidden}
#boss-hp-fill{height:100%;width:100%;background:linear-gradient(90deg,#8b0000,#ff2222);transition:width .15s;border-radius:8px}
#boss-hp-text{color:#ff6666;font-size:12px;text-align:center}
#gold-carry{position:fixed;top:12px;right:16px;display:flex;align-items:center;gap:6px;background:rgba(0,0,0,.7);border:2px solid #c8a23c;border-radius:8px;padding:5px 12px;z-index:10;pointer-events:none}
#hero-info{position:fixed;top:12px;left:16px;display:flex;align-items:center;gap:10px;background:rgba(0,0,0,.7);border:2px solid #4488ff;border-radius:10px;padding:6px 14px;z-index:10;pointer-events:none}
#hero-avatar{width:40px;height:40px;border-radius:50%;border:2px solid #4488ff;background:radial-gradient(#223366,#0a0a2a);display:flex;align-items:center;justify-content:center;font-size:20px}
#hero-details{display:flex;flex-direction:column;gap:3px}
#hero-name{color:#66aaff;font-size:14px;font-weight:bold;text-shadow:0 0 6px rgba(68,136,255,.4)}
#hero-hp-bar{width:120px;height:12px;background:#1a1a2a;border:1px solid #335;border-radius:6px;overflow:hidden}
#hero-hp-fill{height:100%;width:100%;background:linear-gradient(90deg,#22cc44,#44ff66);transition:width .2s;border-radius:6px}
#hero-hp-text{color:#66ff88;font-size:11px;text-align:center}
.gicon{font-size:22px;line-height:1}
.gval{color:#ffd700;font-size:22px;font-weight:bold;text-shadow:0 0 6px rgba(255,215,0,.5)}
#hint{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);color:#ffd700;font-size:20px;font-weight:bold;text-shadow:0 0 10px rgba(255,215,0,.6);pointer-events:none;z-index:10;opacity:0;transition:opacity .5s}
#hint.v{opacity:1}
#boss-announce{position:fixed;top:35%;left:50%;transform:translate(-50%,-50%);color:#ff4444;font-size:32px;font-weight:bold;text-shadow:0 0 20px rgba(255,0,0,.6),0 2px 4px #000;pointer-events:none;z-index:20;opacity:0;transition:opacity .4s;white-space:nowrap}
#boss-announce.v{opacity:1;animation:anBounce .6s ease-out}
@keyframes anBounce{0%{transform:translate(-50%,-50%) scale(0)}60%{transform:translate(-50%,-50%) scale(1.15)}100%{transform:translate(-50%,-50%) scale(1)}}
#dmg-layer{position:fixed;inset:0;pointer-events:none;z-index:15}
.dmg{position:absolute;font-size:32px;font-weight:900;-webkit-text-stroke:1.5px #000;text-shadow:0 0 8px #000,0 2px 4px rgba(0,0,0,.8);animation:dmgF .8s ease-out forwards;pointer-events:none}
@keyframes dmgF{0%{opacity:1;transform:translateY(0) scale(1.2)}100%{opacity:0;transform:translateY(-60px) scale(.7)}}
#ulabels{position:fixed;inset:0;pointer-events:none;z-index:12}
.ulab{position:absolute;background:rgba(0,0,0,.8);border:1px solid #c8a23c;border-radius:6px;padding:5px 10px;color:#ffd700;font-size:14px;font-weight:bold;white-space:nowrap}
#levelup{position:fixed;top:40%;left:50%;transform:translate(-50%,-50%);font-size:40px;font-weight:bold;color:#ffd700;text-shadow:0 0 30px rgba(255,215,0,.8);pointer-events:none;z-index:20;opacity:0}
#levelup.v{opacity:1;animation:lvup .8s ease-out forwards}
@keyframes lvup{0%{transform:translate(-50%,-50%) scale(0);opacity:1}50%{transform:translate(-50%,-50%) scale(1.3);opacity:1}100%{transform:translate(-50%,-50%) scale(1);opacity:0}}
#tut-wrap{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:6px;pointer-events:none;z-index:25}
#tut-joy{position:relative;width:90px;height:90px;border-radius:50%;background:rgba(255,255,255,.12);border:2px solid rgba(255,255,255,.3)}
#tut-knob{position:absolute;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.5);top:50%;left:50%;transform:translate(-50%,-50%);animation:tutKnob 2s ease-in-out infinite}
#tut-hand{position:absolute;font-size:36px;bottom:-10px;right:-15px;animation:tutHand 2s ease-in-out infinite;opacity:.85}
#tut-text{color:#fff;font-size:15px;font-weight:bold;text-shadow:0 0 10px rgba(255,255,255,.5);animation:tutPulse 2s ease-in-out infinite}
@keyframes tutKnob{0%{transform:translate(-50%,-50%)}25%{transform:translate(-20%,-70%)}50%{transform:translate(10%,-50%)}75%{transform:translate(-20%,-30%)}100%{transform:translate(-50%,-50%)}}
@keyframes tutHand{0%{transform:translate(0,0)}25%{transform:translate(15px,-12px)}50%{transform:translate(25px,0)}75%{transform:translate(15px,12px)}100%{transform:translate(0,0)}}
@keyframes tutPulse{0%,100%{opacity:.6}50%{opacity:1}}
#joy-overlay{position:fixed;inset:0;z-index:18;pointer-events:none!important}
.joy-base{position:absolute;width:90px;height:90px;border-radius:50%;background:rgba(255,255,255,.12);border:2px solid rgba(255,255,255,.25);display:none}
.joy-knob{position:absolute;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.45);display:none}
#victory{position:fixed;inset:0;z-index:9999;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.85)}
#victory.v{display:flex}
#victory h1{font-size:48px;color:#ffd700;text-shadow:0 0 30px rgba(255,215,0,.8);margin-bottom:12px}
#victory .st{color:#ffd700;font-size:28px;font-weight:bold;text-shadow:0 0 20px rgba(255,215,0,.6),0 2px 4px #000;margin-bottom:30px;text-align:center;line-height:1.8}
#victory .dlbtn{padding:16px 48px;font-size:20px;font-weight:bold;border:none;border-radius:12px;cursor:pointer;background:linear-gradient(135deg,#ffd700,#ff8c00);color:#1a0a00;box-shadow:0 0 20px rgba(255,215,0,.5);animation:ctaP 2s ease-in-out infinite}
#victory .rebtn{margin-top:12px;padding:10px 30px;font-size:14px;background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3);border-radius:8px;cursor:pointer}
@keyframes ctaP{0%,100%{box-shadow:0 0 20px rgba(255,215,0,.5)}50%{box-shadow:0 0 40px rgba(255,215,0,.9)}}
</style>
</head>
<body>
<div id="hud">
  <div id="boss-info"><div id="boss-avatar">💀</div><div id="boss-details">
    <div id="boss-name">NIGHT KING</div><div id="boss-level">Lvl 10</div>
    <div id="boss-hp-bar"><div id="boss-hp-fill"></div></div>
    <div id="boss-hp-text">2,000/2,000</div></div></div>
</div>
<div id="hero-info"><div id="hero-avatar">⚔️</div><div id="hero-details">
  <div id="hero-name">勇士</div>
  <div id="hero-hp-bar"><div id="hero-hp-fill"></div></div>
  <div id="hero-hp-text">100/100</div></div></div>
<div id="gold-carry"><div class="gicon">🪙</div><div class="gval" id="gold-val">0</div></div>
<div id="hint"></div>
<div id="boss-announce"></div>
<div id="dmg-layer"></div>
<div id="ulabels"></div>
<div id="levelup"></div>
<div id="tut-wrap"><div id="tut-joy"><div id="tut-knob"></div><div id="tut-hand">👆</div></div><div id="tut-text">拖动摇杆移动</div></div>
<div id="joy-overlay"><div class="joy-base" id="jb"></div><div class="joy-knob" id="jk"></div></div>
<div id="victory">
  <h1>🐉 下载《万龙觉醒》</h1>
  <div class="st">开启您的魔幻征程！</div>
  <button class="dlbtn" onclick="window.open('https://play.google.com','_blank')">立即下载</button>
  <button class="rebtn" id="rebtn">▶ 再玩一次</button>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';
// === CONFIG ===
const C={
  BASE_Z:0, BOSS_DIST:20,
  BOSSES:[
    {name:'蜥蜴人',lvl:10,hp:8000,color:0x446633,sz:3.5,emoji:'🦎',side:1},
    {name:'双头巨熊',lvl:20,hp:12000,color:0x886644,sz:5,emoji:'🐻',side:-1},
    {name:'烈焰巨龙',lvl:30,hp:10000,color:0xcc2200,sz:6.5,emoji:'🐉',side:1}
  ],
  BOW:[
    {cost:0,dmg:100,arrows:1,color:0xffffff,nameTag:'初始弓',homing:false,aoe:false},
    {cost:20,dmg:100,arrows:3,color:0x4488ff,nameTag:'三连射',homing:false,aoe:false},
    {cost:40,dmg:200,arrows:3,color:0xaa44ff,nameTag:'魔法箭',homing:false,aoe:true},
    {cost:45,dmg:240,arrows:5,color:0xffd700,nameTag:'追踪箭暴',homing:true,aoe:true}
  ],
  DRAGONS:[
    {cost:35,dmg:60,color:0xff4422,sz:1,projColor:0xff6600,name:'火焰幼龙'},
    {cost:40,dmg:120,color:0xaa44ff,sz:1.5,projColor:0x8844ff,name:'雷电青龙'},
    {cost:20,dmg:200,color:0xffd700,sz:2,projColor:0xffaa00,name:'黄金神龙'}
  ],
  HERO_SPEED:12,ATK_RANGE:5,ATK_CD:.8,BOSS_SPEED:2,BOSS_ATK_CD:3,BOSS_SKILL1_CD:8,BOSS_SKILL2_CD:15,
  EGG_BUILD_COST:8
};
// === STATE ===
const S={
  gold:0,bossIdx:0,phase:'idle',gameOver:false,bowLv:0,dragonCount:0,
  bossHP:0,bossMaxHP:0,bossMesh:null,bossAI:{atkT:3,sk1T:8,sk2T:15,flashT:0,chargeT:0,chargeDir:null},
  heroPos:{x:0,z:C.BASE_Z},heroAtk:0,
  goldBars:[],particles:[],projectiles:[],shakeT:0,
  wStation:{x:-6,z:C.BASE_Z,gold:0},dStation:{x:6,z:C.BASE_Z,gold:0,phase:'hidden'},
  dragons:[],tutDone:false,bossSpawnSide:1,
  carryingEgg:false,droppedEggs:[],atkGoldCount:0,boss2Dead:false,zoneCooldown:0
};
let scene,cam,renderer,clock;
let heroGroup,heroBow,backpackGroup,heroHP=100,heroMaxHP=100;
let wStationMesh,dStationMesh,eggMesh;
let wFillMesh,dFillMesh,wProgSprite,dProgSprite;
let audioCtx,keys={w:0,a:0,s:0,d:0};
let joyVec={x:0,y:0},joyActive=false,joyTouchId=null,joyStart={x:0,y:0};
const $=id=>document.getElementById(id);

// === AUDIO ===
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)}
function snd(t){if(!audioCtx)return;const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.connect(g);g.connect(audioCtx.destination);const n=audioCtx.currentTime;
  const P={atk:[200,100,.08,'sawtooth',.1],pick:[1800,2400,.05,'sine',.08],drop:[800,400,.1,'triangle',.06],
    upgrade:[400,1600,.3,'triangle',.15],hatch:[600,1800,.4,'sine',.12],boom:[100,30,.4,'sawtooth',.25],
    win:[523,1047,.5,'triangle',.15],hit:[150,60,.1,'square',.08],
    donate:[1200,1600,.04,'sine',.06],roar:[80,40,.6,'sawtooth',.2],fire:[300,80,.3,'sawtooth',.1]}[t];
  if(!P)return;o.frequency.setValueAtTime(P[0],n);o.frequency.linearRampToValueAtTime(P[1],n+P[2]);
  g.gain.setValueAtTime(P[4],n);g.gain.linearRampToValueAtTime(0,n+P[2]+.1);o.type=P[3];o.start(n);o.stop(n+.8)}

// === INIT ===
function init(){
  scene=new THREE.Scene();scene.background=new THREE.Color(0x0a1020);scene.fog=new THREE.Fog(0x0a1020,50,100);
  cam=new THREE.PerspectiveCamera(40,innerWidth/innerHeight,.1,200);
  cam.position.set(0,18,C.BASE_Z+16);cam.lookAt(0,0,C.BASE_Z);
  renderer=new THREE.WebGLRenderer({antialias:true});renderer.setSize(innerWidth,innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));renderer.shadowMap.enabled=true;
  renderer.domElement.style.position='fixed';renderer.domElement.style.top='0';renderer.domElement.style.left='0';renderer.domElement.style.zIndex='1';
  document.body.appendChild(renderer.domElement);clock=new THREE.Clock();
  console.log('BossFightRPG v3 init');
  scene.add(new THREE.AmbientLight(0x6688aa,.8));
  const dl=new THREE.DirectionalLight(0xffeedd,1.0);dl.position.set(10,20,10);dl.castShadow=true;scene.add(dl);
  buildWorld();buildHero();buildStations();setupInput();

  window.addEventListener('resize',()=>{cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)});
}

// === WORLD ===
function buildWorld(){
  const gnd=new THREE.Mesh(new THREE.PlaneGeometry(80,80),new THREE.MeshStandardMaterial({color:0x1a2a1a,roughness:1}));
  gnd.rotation.x=-Math.PI/2;gnd.position.y=-.5;gnd.receiveShadow=true;scene.add(gnd);
  // Path north+south
  const pm=new THREE.MeshStandardMaterial({color:0x2a3a2a,roughness:.9});
  const pN=new THREE.Mesh(new THREE.PlaneGeometry(5,C.BOSS_DIST+5),pm);pN.rotation.x=-Math.PI/2;pN.position.set(0,-.48,C.BASE_Z-C.BOSS_DIST/2-2);scene.add(pN);
  const pS=new THREE.Mesh(new THREE.PlaneGeometry(5,C.BOSS_DIST+5),pm);pS.rotation.x=-Math.PI/2;pS.position.set(0,-.48,C.BASE_Z+C.BOSS_DIST/2+2);scene.add(pS);
  // Base platform (expanded)
  const base=new THREE.Mesh(new THREE.BoxGeometry(20,.5,16),new THREE.MeshStandardMaterial({color:0x554433,roughness:.9}));
  base.position.set(0,-.25,C.BASE_Z);base.receiveShadow=true;scene.add(base);
  // Walls (leave gaps for north and south gates)
  const wm=new THREE.MeshStandardMaterial({color:0x667788,roughness:.8});
  // East wall (two halves with blocked gate, gate opens for dragon)
  S.eastGateOpen=false;
  const eastGateMeshes=[];
  [[-10,0,C.BASE_Z,.6,3,16]].forEach(w=>{
    const m=new THREE.Mesh(new THREE.BoxGeometry(w[3],w[4],w[5]),wm);m.position.set(w[0],1.25,w[2]);m.castShadow=true;scene.add(m)});
  // East wall: top half (z: BASE_Z-8 to BASE_Z-1.5) and bottom half (z: BASE_Z+1.5 to BASE_Z+8)
  [[10,1.25,C.BASE_Z-4.75,.6,3,6.5],[10,1.25,C.BASE_Z+4.75,.6,3,6.5]].forEach(w=>{
    const m=new THREE.Mesh(new THREE.BoxGeometry(w[3],w[4],w[5]),wm);m.position.set(w[0],w[1],w[2]);m.castShadow=true;scene.add(m)});
  // East gate blocking meshes (removed when dragon appears)
  const gateBlock=new THREE.Mesh(new THREE.BoxGeometry(.6,3,3),wm.clone());
  gateBlock.position.set(10,1.25,C.BASE_Z);gateBlock.castShadow=true;scene.add(gateBlock);
  S.eastGateMesh=gateBlock;
  // North wall (two halves with gap)
  [[-6.5,1.25,C.BASE_Z-8,7,3,.6],[6.5,1.25,C.BASE_Z-8,7,3,.6]].forEach(w=>{
    const m=new THREE.Mesh(new THREE.BoxGeometry(w[3],w[4],w[5]),wm);m.position.set(w[0],w[1],w[2]);m.castShadow=true;scene.add(m)});
  // South wall (two halves with gap)
  [[-6.5,1.25,C.BASE_Z+8,7,3,.6],[6.5,1.25,C.BASE_Z+8,7,3,.6]].forEach(w=>{
    const m=new THREE.Mesh(new THREE.BoxGeometry(w[3],w[4],w[5]),wm);m.position.set(w[0],w[1],w[2]);m.castShadow=true;scene.add(m)});
  // Torches at corners
  [[-9,C.BASE_Z-7],[9,C.BASE_Z-7],[-9,C.BASE_Z+7],[9,C.BASE_Z+7]].forEach(p=>{
    const t=new THREE.Mesh(new THREE.CylinderGeometry(.1,.12,1.2,6),new THREE.MeshStandardMaterial({color:0x553311}));
    t.position.set(p[0],2,p[1]);scene.add(t);
    const f=new THREE.Mesh(new THREE.SphereGeometry(.2,6,6),new THREE.MeshBasicMaterial({color:0xff6600}));
    f.position.set(p[0],2.7,p[1]);f.userData.flame=true;scene.add(f);
    const pl=new THREE.PointLight(0xff6600,.6,8);pl.position.set(p[0],2.8,p[1]);scene.add(pl)});
  // Trees
  for(let i=0;i<20;i++){const x=(Math.random()-.5)*60,z=(Math.random()-.5)*70;
    if(Math.abs(x)<12&&Math.abs(z-C.BASE_Z)<C.BOSS_DIST+12)continue;
    const tr=new THREE.Mesh(new THREE.CylinderGeometry(.15,.25,2,6),new THREE.MeshStandardMaterial({color:0x3d2817}));
    tr.position.set(x,1,z);scene.add(tr);
    const cr=new THREE.Mesh(new THREE.ConeGeometry(1.2,2.5,6),new THREE.MeshStandardMaterial({color:0x1a3322}));
    cr.position.set(x,3,z);scene.add(cr)}
}

// === HERO ===
function buildHero(){
  heroGroup=new THREE.Group();
  const body=new THREE.Mesh(new THREE.BoxGeometry(.7,1.4,.5),new THREE.MeshStandardMaterial({color:0x4488ff,metalness:.3}));
  body.position.y=.7;body.castShadow=true;
  const head=new THREE.Mesh(new THREE.SphereGeometry(.28,8,8),new THREE.MeshStandardMaterial({color:0xffccaa}));
  head.position.y=1.6;
  heroBow=new THREE.Group();
  const bowBody=new THREE.Mesh(new THREE.TorusGeometry(.4,.04,8,12,Math.PI),new THREE.MeshStandardMaterial({color:0x885522}));
  bowBody.rotation.z=Math.PI/2;bowBody.position.set(.5,.9,0);
  const bowString=new THREE.Mesh(new THREE.CylinderGeometry(.01,.01,.8,4),new THREE.MeshBasicMaterial({color:0xcccccc}));
  bowString.position.set(.5,.9,0);
  heroBow.add(bowBody,bowString);heroBow.userData.bowMesh=bowBody;
  backpackGroup=new THREE.Group();backpackGroup.position.set(0,.5,.35);
  heroGroup.add(body,head,heroBow,backpackGroup);
  heroGroup.position.set(0,0,C.BASE_Z);scene.add(heroGroup);
}
function updateBackpack(){
  while(backpackGroup.children.length)backpackGroup.remove(backpackGroup.children[0]);
  for(let i=0;i<Math.min(S.gold,30);i++){
    const b=new THREE.Mesh(new THREE.BoxGeometry(.4,.15,.25),new THREE.MeshBasicMaterial({color:0xffd700}));
    b.position.set(0,i*.16,0);backpackGroup.add(b)}
}

// === STATIONS ===
const ZS=2.2;// zone square half-size
function makeProgressSprite(){
  const c=document.createElement('canvas');c.width=512;c.height=128;
  const ctx=c.getContext('2d');ctx.clearRect(0,0,512,128);
  const tex=new THREE.CanvasTexture(c);
  const mat=new THREE.SpriteMaterial({map:tex,transparent:true,depthTest:false});
  const sp=new THREE.Sprite(mat);sp.scale.set(4,1.5,1);sp.userData.canvas=c;sp.userData.ctx=ctx;sp.userData.tex=tex;
  return sp;
}
function updateProgressSprite(sp,current,total){
  const c=sp.userData.canvas,ctx=sp.userData.ctx;
  ctx.clearRect(0,0,512,128);
  ctx.font='bold 72px Arial';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillStyle='rgba(255,215,0,0.9)';ctx.strokeStyle='rgba(0,0,0,0.7)';ctx.lineWidth=5;
  const txt=total<=0?(current<0?'孵化龙蛋':'满级'):current+'/'+total;ctx.strokeText(txt,256,64);ctx.fillText(txt,256,64);
  sp.userData.tex.needsUpdate=true;
}
function buildStations(){
  const zoneMat=new THREE.MeshBasicMaterial({color:0xffd700,transparent:true,opacity:.12,side:THREE.DoubleSide});
  // Build square zone helper
  function makeSquareZone(sx,sz,parentGroup){
    const target=parentGroup||scene;
    // Fill zone
    const zone=new THREE.Mesh(new THREE.PlaneGeometry(ZS*2,ZS*2),zoneMat.clone());
    zone.rotation.x=-Math.PI/2;zone.position.set(sx,.02,sz);target.add(zone);
    // Border (4 edges)
    const bm=new THREE.MeshBasicMaterial({color:0xffd700,transparent:true,opacity:.4});
    const t=.06;// border thickness
    [[-ZS,0,t,ZS*2],[ZS,0,t,ZS*2],[0,-ZS,ZS*2,t],[0,ZS,ZS*2,t]].forEach(([ox,oz,w,h])=>{
      const b=new THREE.Mesh(new THREE.PlaneGeometry(w,h),bm.clone());
      b.rotation.x=-Math.PI/2;b.position.set(sx+ox,.03,sz+oz);target.add(b);});
    // Progress bar fill (starts at 0 height, grows upward along z)
    const fill=new THREE.Mesh(new THREE.PlaneGeometry(ZS*2-.1,.01),new THREE.MeshBasicMaterial({color:0x44aaff,transparent:true,opacity:.35,side:THREE.DoubleSide}));
    fill.rotation.x=-Math.PI/2;fill.position.set(sx,.025,sz+ZS);target.add(fill);
    return fill;
  }
  // Weapon (left)

function bossAI(dt){
  if(!S.bossMesh||S.bossHP<=0)return;
  const bp=S.bossMesh.position,hp=heroGroup.position;
  const cfg=C.BOSSES[S.bossIdx],side=cfg.side;
  const lairZ=C.BASE_Z-side*C.BOSS_DIST;// boss spawn z
  const lairR=10;// lair radius from spawn point
  const dx=hp.x-bp.x,dz=hp.z-bp.z,dist=Math.sqrt(dx*dx+dz*dz);
  // Face hero (models face -Z, so add PI)
  S.bossMesh.rotation.y=Math.atan2(dx,dz)+Math.PI;
  // Idle float
  S.bossMesh.position.y=Math.sin(Date.now()*.003)*.3;
  // Charge movement
  if(S.bossAI.chargeT>0){S.bossAI.chargeT-=dt;
    bp.x+=S.bossAI.chargeDir.x*20*dt;bp.z+=S.bossAI.chargeDir.z*20*dt;}
  else{
  // Move toward hero slowly only if hero is within lair range
  const hDistToLair=Math.sqrt(hp.x*hp.x+(hp.z-lairZ)*(hp.z-lairZ));
  if(dist>3&&hDistToLair<lairR){const spd=C.BOSS_SPEED*dt/dist;bp.x+=dx*spd;bp.z+=dz*spd}
  else if(dist>3){
    // Return to lair center
    const dlx=0-bp.x,dlz=lairZ-bp.z,dld=Math.sqrt(dlx*dlx+dlz*dlz);
    if(dld>1){const spd=C.BOSS_SPEED*dt/dld;bp.x+=dlx*spd;bp.z+=dlz*spd}
  }
  }
  // Clamp boss to lair bounds
  const bdx=bp.x-0,bdz=bp.z-lairZ;
  const bDist=Math.sqrt(bdx*bdx+bdz*bdz);
  if(bDist>lairR){bp.x=bdx/bDist*lairR;bp.z=lairZ+bdz/bDist*lairR}
  bp.x=Math.max(-20,Math.min(20,bp.x));
  // Attack
  S.bossAI.atkT-=dt;
  if(S.bossAI.atkT<=0&&dist<6){S.bossAI.atkT=C.BOSS_ATK_CD;snd('hit');
    // Lunge animation
    const ox=bp.x,oz=bp.z;bp.x+=dx/dist*1.5;bp.z+=dz/dist*1.5;
    setTimeout(()=>{if(S.bossMesh){bp.x=ox;bp.z=oz}},200);
    heroHP-=5;heroHP=Math.max(heroMaxHP*.1,heroHP);updateHeroUI();S.shakeT=.1}
  // Skill 1: Ground slam
  S.bossAI.sk1T-=dt;
  if(S.bossAI.sk1T<=0){S.bossAI.sk1T=C.BOSS_SKILL1_CD;snd('boom');
    // Jump up then slam
    const oy=bp.y;bp.y=3;setTimeout(()=>{if(S.bossMesh){bp.y=0;S.shakeT=.3;
      spawnRing(bp.x,0,bp.z,0xff4400,8);heroHP-=10;heroHP=Math.max(heroMaxHP*.1,heroHP);updateHeroUI()}},400)}
  // Skill 2: Charge
  S.bossAI.sk2T-=dt;
  if(S.bossAI.sk2T<=0&&dist>4){S.bossAI.sk2T=C.BOSS_SKILL2_CD;
    S.bossAI.chargeDir={x:dx/dist,z:dz/dist};S.bossAI.chargeT=.3;snd('hit')}
  // Flash red when recently hit
  if(S.bossAI.flashT>0){S.bossAI.flashT-=dt;
    S.bossMesh.children[0].material.emissive.setHex(0xff0000);S.bossMesh.children[0].material.emissiveIntensity=S.bossAI.flashT*5;
  }else{S.bossMesh.children[0].material.emissiveIntensity=0}
}

// === BOW ATTACK ===
function heroAttack(dt){
  if(!S.bossMesh||S.bossHP<=0||S.phase!=='fight')return;
  const hp=heroGroup.position,bp=S.bossMesh.position;
  const dx=bp.x-hp.x,dz=bp.z-hp.z,dist=Math.sqrt(dx*dx+dz*dz);
  if(dist>C.ATK_RANGE+C.BOSSES[S.bossIdx].sz*.5)return;
  S.heroAtk-=dt;if(S.heroAtk>0)return;
  S.heroAtk=C.ATK_CD;snd('atk');
  const bow=C.BOW[S.bowLv],nArrows=bow.arrows;
  heroGroup.rotation.y=Math.atan2(dx,dz)+Math.PI;
  const baseAngle=Math.atan2(dx,dz);
  for(let i=0;i<nArrows;i++){
    const spread=(i-(nArrows-1)/2)*.15;
    const ang=baseAngle+spread;
    const dirX=Math.sin(ang),dirZ=Math.cos(ang);
    spawnArrow(hp,bow.homing?bp:null,dirX,dirZ,bow.color,bow.dmg,bow.aoe,bow.homing);
  }
  for(let i=0;i<3;i++)dropGoldBar(bp.x,bp.z);
}
function spawnArrow(from,target,dx,dz,color,dmg,aoe,homing){
  const lvScale=1+S.bowLv*0.4;// arrows get bigger with upgrades
  const arrowR=.03*lvScale,arrowL=.6*lvScale;
  const m=new THREE.Mesh(new THREE.CylinderGeometry(arrowR*.6,arrowR,arrowL,4),new THREE.MeshBasicMaterial({color}));
  m.position.set(from.x,1.5,from.z);m.rotation.x=Math.PI/2;
  // Trail — longer and more intense per level
  const trailL=.4+S.bowLv*.25;
  const trail=new THREE.Mesh(new THREE.CylinderGeometry(.01,.015*lvScale,trailL,4),new THREE.MeshBasicMaterial({color,transparent:true,opacity:.3+S.bowLv*.15}));
  trail.position.y=-trailL/2;m.add(trail);
  // Glow for level 2+ (emissive glow sphere)
  if(S.bowLv>=2){
    const glow=new THREE.Mesh(new THREE.SphereGeometry(.08*lvScale,6,6),new THREE.MeshBasicMaterial({color,transparent:true,opacity:.35}));
    m.add(glow);
  }
  scene.add(m);
  S.projectiles.push({mesh:m,dx,dz,speed:30,life:2,dmg,aoe,homing,target,color});
}
// Boss-specific damage multiplier
function getDmgMultiplier(){
  // Boss 1 (蜥蜴人): weapon 1 upgrade gives +50% damage
  if(S.bossIdx===0&&S.bowLv>=1)return 1.5;
  // Boss 2 (双头巨熊): has 40% armor. Broken only by having BOTH weapon 2 AND dragon
  if(S.bossIdx===1){
    const hasWeapon2=S.bowLv>=2;
    const hasDragon=S.dragonCount>=1;
    if(hasWeapon2&&hasDragon)return 1.0;// Armor broken!
    return 0.6;// 40% damage reduction
  }
  return 1.0;
}
function updateProjectiles(dt){
  S.projectiles=S.projectiles.filter(p=>{
    p.life-=dt;if(p.life<=0){scene.remove(p.mesh);return false}
    if(p.homing&&p.target&&S.bossMesh){
      const dx=p.target.x-p.mesh.position.x,dz=p.target.z-p.mesh.position.z;
      const d=Math.sqrt(dx*dx+dz*dz);if(d>.5){p.dx=dx/d;p.dz=dz/d}}
    p.mesh.position.x+=p.dx*p.speed*dt;p.mesh.position.z+=p.dz*p.speed*dt;
    p.mesh.rotation.y=Math.atan2(p.dx,p.dz);
    // Hit boss
    if(S.bossMesh&&S.bossHP>0){
      const dx=p.mesh.position.x-S.bossMesh.position.x,dz=p.mesh.position.z-S.bossMesh.position.z;
      const hitR=C.BOSSES[S.bossIdx]?C.BOSSES[S.bossIdx].sz*.4:2;
      if(dx*dx+dz*dz<hitR*hitR){
        // Apply boss-specific damage multiplier
        const mult=getDmgMultiplier();
        const finalDmg=Math.round(p.dmg*mult);
        S.bossHP-=finalDmg;updateBossUI();S.bossAI.flashT=.1;
        showDmg(S.bossMesh.position,finalDmg,p.color);
        // Hit burst scales with bow level (capped for performance)
        const hitParticles=Math.min(3+S.bowLv*2,8);
        spawnBurst(p.mesh.position.x,1.5,p.mesh.position.z,p.color,hitParticles);
        if(p.aoe)spawnBurst(p.mesh.position.x,1.5,p.mesh.position.z,p.color,Math.min(hitParticles+4,10));
        scene.remove(p.mesh);
        if(S.bossHP<=0)bossDie();return false}}
    return true});
}

  const x=cx+Math.cos(ang)*r,z=cz+Math.sin(ang)*r;
  const m=new THREE.Mesh(new THREE.BoxGeometry(.45,.22,.28),new THREE.MeshBasicMaterial({color:0xffd700}));
  m.position.set(x,2.5,z);scene.add(m);
  S.goldBars.push({mesh:m,vy:5+Math.random()*3,grounded:false,life:30});snd('drop');
}
function pickupGold(){
  const hp=heroGroup.position;
  for(let i=S.goldBars.length-1;i>=0;i--){
    const g=S.goldBars[i];if(!g.grounded)continue;
    const dx=g.mesh.position.x-hp.x,dz=g.mesh.position.z-hp.z;
    const dd=dx*dx+dz*dz;
    // Magnetic pull: gold within 5 units drifts toward player
    if(dd<25&&dd>=9){g.mesh.position.x-=dx*0.06;g.mesh.position.z-=dz*0.06}
    // Pickup within 3 units
    if(dd<9){scene.remove(g.mesh);S.goldBars.splice(i,1);
      S.gold++;updateGoldUI();updateBackpack();snd('pick');}
  }
  // Pickup dropped eggs
  for(let i=S.droppedEggs.length-1;i>=0;i--){
    const e=S.droppedEggs[i];if(!e.grounded)continue;
    const dx=e.mesh.position.x-hp.x,dz=e.mesh.position.z-hp.z;
    if(dx*dx+dz*dz<4){scene.remove(e.mesh);S.droppedEggs.splice(i,1);
      S.carryingEgg=true;snd('pick');
      showHint('🥚 拿到龙蛋了！带回孵化台！');
      // Show egg on hero backpack
      if(!heroGroup.userData.eggMesh){
        const dc=C.DRAGONS[S.dragonCount];
        const em=new THREE.Mesh(new THREE.SphereGeometry(.3,8,8),new THREE.MeshStandardMaterial({color:dc.color,emissive:dc.color,emissiveIntensity:.4}));
        em.position.set(0,1.8,0);heroGroup.add(em);heroGroup.userData.eggMesh=em;
      }
      // If boss 2 has been killed, trigger dragon cinematic
      if(S.boss2Dead&&S.phase!=='cinematic'){
        S.phase='fight';
        S.bossIdx=2;
        setTimeout(spawnBoss,1500);
      }
    }
  }
}
function updateGoldBars(dt){
  S.goldBars=S.goldBars.filter(g=>{
    if(!g.grounded){g.vy-=15*dt;g.mesh.position.y+=g.vy*dt;
      if(g.mesh.position.y<=.12){g.mesh.position.y=.12;g.grounded=true}}
    g.mesh.rotation.y+=dt*2;g.life-=dt;
    if(g.life<=0){scene.remove(g.mesh);return false}return true});
  // Update dropped eggs physics
  S.droppedEggs.forEach(e=>{
    if(!e.grounded){e.vy-=12*dt;e.mesh.position.y+=e.vy*dt;
      if(e.mesh.position.y<=.5){e.mesh.position.y=.5;e.grounded=true}}
    e.mesh.rotation.y+=dt;
    // Bob the green arrow up and down
    if(e.arrow)e.arrow.position.y=1.5+Math.sin(Date.now()*.005)*.4;
  });
}

// === UPGRADES ===
// Helper: update bar fill (rectangle growing bottom-to-top)
function updateBarFill(mesh,progress,sx,sz){
  const p=Math.min(1,Math.max(0,progress));
  const h=(ZS*2-.1)*p;// filled height
  mesh.geometry.dispose();
  mesh.geometry=new THREE.PlaneGeometry(ZS*2-.1,Math.max(.01,h));
  mesh.position.set(sx,.025,sz+ZS-h/2);// anchor at bottom, grow up
}
let drainTimer=0;
function drainStations(dt){
  drainTimer-=dt;if(drainTimer>0)return;
  // Zone cooldown after upgrade
  if(S.zoneCooldown>0){
    S.zoneCooldown-=dt;
    if(S.zoneCooldown<=0){
      // Restore zone visuals
      S.zoneCooldown=0;
      wFillMesh.visible=true;wProgSprite.visible=true;
      if(S.dStation.phase!=='hidden'){dFillMesh.visible=true;dProgSprite.visible=true;}
    }
    return;
  }
  const hp=heroGroup.position;
  // AABB zone check
  function inZone(px,pz,sx,sz){return Math.abs(px-sx)<ZS&&Math.abs(pz-sz)<ZS}
  // Weapon station
  if(S.bowLv<C.BOW.length-1){
    if(inZone(hp.x,hp.z,S.wStation.x,S.wStation.z)&&S.gold>0){
      const next=C.BOW[S.bowLv+1];
      drainTimer=next.cost>=40?.05:next.cost>=30?.06:.12;
      S.gold--;S.wStation.gold++;
      updateGoldUI();updateBackpack();snd('donate');
      spawnBurst(S.wStation.x,1,S.wStation.z,0xffd700,2);
      updateBarFill(wFillMesh,S.wStation.gold/next.cost,S.wStation.x,S.wStation.z);
      updateProgressSprite(wProgSprite,S.wStation.gold,next.cost);
      if(S.wStation.gold>=next.cost){
        S.wStation.gold-=next.cost;S.bowLv++;snd('upgrade');
        spawnBurst(S.wStation.x,2,S.wStation.z,0xffdd00,20);spawnPillar(S.wStation.x,S.wStation.z);
        heroBow.userData.bowMesh.material.color.setHex(next.color);
        heroBow.userData.bowMesh.material.emissive=new THREE.Color(next.color);
        heroBow.userData.bowMesh.material.emissiveIntensity=.3;
        heroBow.scale.setScalar(1+S.bowLv*.25);
        showLevelUp('⬆ 等级提升，获得 '+next.nameTag+'!');
        updateBarFill(wFillMesh,0,S.wStation.x,S.wStation.z);
        if(S.bowLv<C.BOW.length-1)updateProgressSprite(wProgSprite,0,C.BOW[S.bowLv+1].cost);
        else updateProgressSprite(wProgSprite,0,0);
        // Hide zones for 2s to encourage fighting
        S.zoneCooldown=2;
        wFillMesh.visible=false;wProgSprite.visible=false;
        dFillMesh.visible=false;dProgSprite.visible=false;
      }
      return;// one coin per tick
    }
  }
  // Dragon station — phase-based logic
  const dPhase=S.dStation.phase;
  if(dPhase==='hidden'){
    // Zone not yet revealed — do nothing
  }else if(dPhase==='wait_egg'){
    // Deliver egg if carrying one
    if(inZone(hp.x,hp.z,S.dStation.x,S.dStation.z)&&S.carryingEgg){
      S.carryingEgg=false;
      if(heroGroup.userData.eggMesh){heroGroup.remove(heroGroup.userData.eggMesh);heroGroup.userData.eggMesh=null}
      S.dStation.phase='has_egg';
      spawnEggOnNest();
      if(S.dStationArrow)S.dStationArrow.visible=false;
      snd('pick');spawnBurst(S.dStation.x,1.5,S.dStation.z,0xffdd00,10);
      showHint('🥚 龙蛋已放置！捐献金币孵化！');
      const dc=C.DRAGONS[S.dragonCount];
      updateProgressSprite(dProgSprite,0,dc.cost);
    }
  }else if(dPhase==='has_egg'&&S.dragonCount<3){
    // Hatch phase: donate gold to hatch dragon
    if(inZone(hp.x,hp.z,S.dStation.x,S.dStation.z)&&S.gold>0){
      const dc=C.DRAGONS[S.dragonCount];
      drainTimer=dc.cost>=35?.06:.12;
      S.gold--;S.dStation.gold++;
      updateGoldUI();updateBackpack();snd('donate');
      spawnBurst(S.dStation.x,1,S.dStation.z,0xffd700,2);
      updateBarFill(dFillMesh,S.dStation.gold/dc.cost,S.dStation.x,S.dStation.z);
      updateProgressSprite(dProgSprite,S.dStation.gold,dc.cost);
      if(S.dStation.gold>=dc.cost){
        S.dStation.gold=0;
        removeEggFromNest();
        hatchDragon();
        updateBarFill(dFillMesh,0,S.dStation.x,S.dStation.z);
        if(S.dragonCount<3){
          S.dStation.phase='wait_egg';
          updateProgressSprite(dProgSprite,-1,0);
        }else{
          S.dStation.phase='done';
          updateProgressSprite(dProgSprite,0,0);
        }
        // Hide zones for 2s to encourage fighting
        S.zoneCooldown=2;
        wFillMesh.visible=false;wProgSprite.visible=false;
        dFillMesh.visible=false;dProgSprite.visible=false;
      }
      return;
    }
  }
}
function hatchDragon(){
  const dc=C.DRAGONS[S.dragonCount],sc=dc.sz;snd('hatch');
  const dg=new THREE.Group();
  const body=new THREE.Mesh(new THREE.ConeGeometry(.35*sc,.9*sc,6),new THREE.MeshStandardMaterial({color:dc.color}));
  body.position.y=1.8;body.rotation.x=.3;
  const head=new THREE.Mesh(new THREE.SphereGeometry(.22*sc,6,6),new THREE.MeshStandardMaterial({color:dc.color}));
  head.position.set(0,2.1+.1*sc,-.15*sc);
  const wm=new THREE.MeshStandardMaterial({color:dc.color,side:THREE.DoubleSide});
  const wL=new THREE.Mesh(new THREE.PlaneGeometry(.7*sc,.35*sc),wm);wL.position.set(-.4*sc,1.9,0);wL.rotation.z=.4;
  const wR=new THREE.Mesh(new THREE.PlaneGeometry(.7*sc,.35*sc),wm);wR.position.set(.4*sc,1.9,0);wR.rotation.z=-.4;
  if(S.dragonCount===2){body.material.emissive=new THREE.Color(0xffd700);body.material.emissiveIntensity=.4}
  dg.add(body,head,wL,wR);dg.position.copy(heroGroup.position);dg.position.y=2;scene.add(dg);
  S.dragons.push({mesh:dg,atkTimer:0,angle:S.dragonCount*2.1,cfg:dc});
  S.dragonCount++;
  spawnBurst(S.dStation.x,2,S.dStation.z,dc.color,25);spawnPillar(S.dStation.x,S.dStation.z);
  showLevelUp('⬆ 等级提升，获得 '+dc.name+'！');
}
function updateDragons(dt){
  S.dragons.forEach((d,i)=>{
    d.angle+=dt*1.5;
    const hp=heroGroup.position;
    const tx=hp.x+Math.cos(d.angle)*2.5,tz=hp.z+Math.sin(d.angle)*2.5;
    d.mesh.position.x+=(tx-d.mesh.position.x)*dt*4;
    d.mesh.position.z+=(tz-d.mesh.position.z)*dt*4;
    d.mesh.position.y=2+Math.sin(Date.now()*.003+i)*.3;
    d.mesh.children[2].rotation.z=.4+Math.sin(Date.now()*.01)*.3;
    d.mesh.children[3].rotation.z=-.4-Math.sin(Date.now()*.01)*.3;
    if(S.bossMesh&&S.bossHP>0){d.atkTimer-=dt;
      if(d.atkTimer<=0){
        const bp=S.bossMesh.position;
        const ddx=bp.x-d.mesh.position.x,ddz=bp.z-d.mesh.position.z;
        const dd=Math.sqrt(ddx*ddx+ddz*ddz)||1;
        if(dd<=C.ATK_RANGE+2){// Dragons must be close to boss to attack
          d.atkTimer=1;
          const isHoming=i===2;
          spawnArrow(d.mesh.position,isHoming?bp:null,ddx/dd,ddz/dd,d.cfg.projColor,d.cfg.dmg,i>=1,isHoming);
        }
      }}
  });
}

// === BOSS DIE ===
function bossDie(){
  S.bossHP=0;snd('boom');S.shakeT=.5;
  const bp=S.bossMesh.position.clone();
  spawnBurst(bp.x,2,bp.z,0xff2200,40);spawnBurst(bp.x,2,bp.z,0xffdd00,30);
  // Remove boss first
  if(S.bossMesh){scene.remove(S.bossMesh);S.bossMesh=null}
  // Remove lair visuals
  if(S.lairZoneMesh){scene.remove(S.lairZoneMesh);S.lairZoneMesh=null}
  if(S.lairBorderMesh){scene.remove(S.lairBorderMesh);S.lairBorderMesh=null}
  $('boss-info').classList.remove('v');
  // Mark boss 2 death immediately for egg pickup detection
  if(S.bossIdx===1)S.boss2Dead=true;
  // Reveal dragon zone on first boss kill (phase was hidden)
  if(S.dStation.phase==='hidden'){
    S.dStation.phase='wait_egg';
    dFillMesh.visible=true;dProgSprite.visible=true;
    if(S.dZoneGroup)S.dZoneGroup.visible=true;
    spawnNestMesh();
    spawnBurst(S.dStation.x,2,S.dStation.z,0xffdd00,15);
    updateProgressSprite(dProgSprite,-1,0);// shows "孵化龙蛋"
    if(S.dStationArrow)S.dStationArrow.visible=true;
    showLevelUp('🥚 孵化台出现了！');
  }
  // Drop dragon egg if nest is waiting for one
  if(S.dStation.phase==='wait_egg'&&S.dragonCount<3){
    const dc=C.DRAGONS[S.dragonCount];
    const em=new THREE.Mesh(new THREE.SphereGeometry(.5,8,8),new THREE.MeshStandardMaterial({color:dc.color,emissive:dc.color,emissiveIntensity:.5}));
    em.position.set(bp.x,2.5,bp.z);scene.add(em);
    // Green arrow indicator above egg
    const arrowGeo=new THREE.ConeGeometry(.25,.8,4);
    const arrowMat=new THREE.MeshBasicMaterial({color:0x44ff44});
    const arrow=new THREE.Mesh(arrowGeo,arrowMat);
    arrow.rotation.x=Math.PI;// Point downward
    arrow.position.set(0,2,0);
    em.add(arrow);
    S.droppedEggs.push({mesh:em,arrow,vy:4,grounded:false});
    showHint('🥚 龙蛋掉落了！快去捡起来！');
    if(S.dStationArrow)S.dStationArrow.visible=true;
  }
  // Gold explosion — staggered waves (amount depends on boss)
  let dropped=0;
  const goldTotal=S.bossIdx===0?8:10;
  const goldWave=setInterval(()=>{
    for(let i=0;i<Math.min(4,goldTotal-dropped);i++)dropGoldBar(bp.x,bp.z);
    dropped+=4;snd('drop');
    if(dropped>=goldTotal)clearInterval(goldWave);
  },150);
  // Next boss after gold settles
  setTimeout(()=>{
    // If dragon cinematic already triggered by egg pickup, do nothing
    if(S.bossIdx>=2||S.phase==='cinematic')return;
    S.bossIdx++;
    if(S.bossIdx>=2){
      // Boss 3 (dragon) is triggered by egg pickup, not spawned here
      S.phase='collect';
      showHint('🥚 快去拾取龙蛋！');
      // If player already picked up the egg during the delay, trigger now
      if(S.carryingEgg){
        S.phase='fight';
        setTimeout(spawnBoss,1500);
      }
    }else{
      S.phase='fight';setTimeout(spawnBoss,1500);
    }
  },2500);
}

function spawnBurst(x,y,z,color,n){
  // Cap total active particles for performance
  const maxP=150;
  if(S.particles.length>maxP)S.particles.splice(0,S.particles.length-maxP+n);
  for(let i=0;i<n;i++)S.particles.push({x,y,z,
    vx:(Math.random()-.5)*8,vy:Math.random()*5+2,vz:(Math.random()-.5)*8,life:1,color,sz:.1+Math.random()*.1});
}
function spawnPillar(x,z){const m=new THREE.Mesh(new THREE.CylinderGeometry(.25,.25,10,8),
  new THREE.MeshBasicMaterial({color:0xffdd44,transparent:true,opacity:.5}));m.position.set(x,5,z);scene.add(m);setTimeout(()=>scene.remove(m),600)}
function spawnRing(x,y,z,color,r){
  const ring=new THREE.Mesh(new THREE.RingGeometry(0,r,24),new THREE.MeshBasicMaterial({color,transparent:true,opacity:.5,side:THREE.DoubleSide}));
  ring.rotation.x=-Math.PI/2;ring.position.set(x,.1,z);scene.add(ring);setTimeout(()=>scene.remove(ring),500)}
function showDmg(pos,val,color){
  const p=pos.clone();p.y+=2;p.project(cam);
  const sx=(p.x*.5+.5)*innerWidth,sy=(-p.y*.5+.5)*innerHeight;
  const el=document.createElement('div');el.className='dmg';
  el.style.color='#'+(color||0xff3333).toString(16).padStart(6,'0');
  el.textContent='-'+val;el.style.left=sx+'px';el.style.top=(sy-20)+'px';
  $('dmg-layer').appendChild(el);setTimeout(()=>el.remove(),800)}
function showLevelUp(t){const el=$('levelup');el.textContent=t;el.classList.remove('v');
  void el.offsetWidth;el.classList.add('v');snd('upgrade')}
let pMeshPool=[],pGeo=null;
function updateParticles(dt){
  if(!pGeo)pGeo=new THREE.SphereGeometry(.12,3,3);// Shared geometry
  // Hide all pool meshes first
  for(let i=0;i<pMeshPool.length;i++)pMeshPool[i].visible=false;
  let idx=0;
  S.particles=S.particles.filter(p=>{p.life-=dt*1.5;if(p.life<=0)return false;
    p.x+=p.vx*dt;p.y+=p.vy*dt;p.z+=p.vz*dt;p.vy-=9.8*dt;
    let m;
    if(idx<pMeshPool.length){
      m=pMeshPool[idx];m.visible=true;m.material.color.setHex(p.color);
    }else{
      m=new THREE.Mesh(pGeo,new THREE.MeshBasicMaterial({color:p.color,transparent:true,opacity:1}));
      scene.add(m);pMeshPool.push(m);
    }
    m.position.set(p.x,Math.max(0,p.y),p.z);
    m.material.opacity=p.life;
    m.scale.setScalar(p.sz/.12);
    idx++;return true});
}

// === INPUT ===
function setupInput(){
  document.addEventListener('keydown',e=>{const k=e.key.toLowerCase();if(k in keys){keys[k]=1;startGame();initAudio()}});
  document.addEventListener('keyup',e=>{const k=e.key.toLowerCase();if(k in keys)keys[k]=0});
  // Dynamic joystick - mouse (listen on document, check target)
  document.addEventListener('mousedown',e=>{
    const t=e.target;if(t.tagName==='BUTTON')return;
    initAudio();startGame();joyActive=true;joyStart={x:e.clientX,y:e.clientY};
    $('jb').style.display='block';$('jb').style.left=(e.clientX-45)+'px';$('jb').style.top=(e.clientY-45)+'px';
    $('jk').style.display='block';$('jk').style.left=(e.clientX-20)+'px';$('jk').style.top=(e.clientY-20)+'px';
  });
  document.addEventListener('mousemove',e=>{if(!joyActive)return;
    let dx=e.clientX-joyStart.x,dy=e.clientY-joyStart.y;
    const d=Math.sqrt(dx*dx+dy*dy),maxR=45;
    if(d>maxR){dx=dx/d*maxR;dy=dy/d*maxR}
    $('jk').style.left=(joyStart.x+dx-20)+'px';$('jk').style.top=(joyStart.y+dy-20)+'px';
    joyVec={x:d>5?dx/maxR:0,y:d>5?dy/maxR:0}});
  document.addEventListener('mouseup',()=>{joyActive=false;joyVec={x:0,y:0};
    $('jb').style.display='none';$('jk').style.display='none'});
  // Touch
  document.addEventListener('touchstart',e=>{
    const t=e.target;if(t.tagName==='BUTTON')return;
    e.preventDefault();initAudio();startGame();const tc=e.touches[0];joyActive=true;joyTouchId=tc.identifier;
    joyStart={x:tc.clientX,y:tc.clientY};
    $('jb').style.display='block';$('jb').style.left=(tc.clientX-45)+'px';$('jb').style.top=(tc.clientY-45)+'px';
    $('jk').style.display='block';$('jk').style.left=(tc.clientX-20)+'px';$('jk').style.top=(tc.clientY-20)+'px';
  },{passive:false});
  document.addEventListener('touchmove',e=>{if(!joyActive)return;
    for(let t of e.changedTouches)if(t.identifier===joyTouchId){
      let dx=t.clientX-joyStart.x,dy=t.clientY-joyStart.y;
      const d=Math.sqrt(dx*dx+dy*dy),maxR=45;
      if(d>maxR){dx=dx/d*maxR;dy=dy/d*maxR}
      $('jk').style.left=(joyStart.x+dx-20)+'px';$('jk').style.top=(joyStart.y+dy-20)+'px';
      joyVec={x:d>5?dx/maxR:0,y:d>5?dy/maxR:0}}},{passive:false});
  document.addEventListener('touchend',e=>{for(let t of e.changedTouches)if(t.identifier===joyTouchId){
    joyActive=false;joyVec={x:0,y:0};$('jb').style.display='none';$('jk').style.display='none'}});
  $('rebtn').addEventListener('click',e=>{e.stopPropagation();restart()});
}
function startGame(){
  if(S.tutDone)return;S.tutDone=true;
  $('tut-wrap').style.display='none';
  S.phase='fight';spawnBoss();
}

// === VICTORY / RESTART ===
function victory(){S.gameOver=true;S.phase='victory';snd('win');
  $('victory').classList.add('v')}
function restart(){
  S.gold=0;S.bossIdx=0;S.phase='idle';S.gameOver=false;S.bowLv=0;S.dragonCount=0;S.atkGoldCount=0;S.boss2Dead=false;S.zoneCooldown=0;
  S.bossHP=0;S.bossMaxHP=0;S.shakeT=0;S.heroAtk=0;S.heroPos={x:0,z:C.BASE_Z};
  S.wStation.gold=0;S.dStation.gold=0;S.dStation.phase='hidden';S.tutDone=false;heroHP=heroMaxHP;updateHeroUI();
  S.carryingEgg=false;S.droppedEggs.forEach(e=>scene.remove(e.mesh));S.droppedEggs=[];
  if(heroGroup.userData.eggMesh){heroGroup.remove(heroGroup.userData.eggMesh);heroGroup.userData.eggMesh=null}
  // Remove dynamic nest/egg meshes
  if(dStationMesh){scene.remove(dStationMesh);dStationMesh=null}
  if(eggMesh){scene.remove(eggMesh);eggMesh=null}
  S.bossAI={atkT:3,sk1T:8,sk2T:15,flashT:0,chargeT:0,chargeDir:null};
  if(S.bossMesh){scene.remove(S.bossMesh);S.bossMesh=null}
  if(S.lairZoneMesh){scene.remove(S.lairZoneMesh);S.lairZoneMesh=null}
  if(S.lairBorderMesh){scene.remove(S.lairBorderMesh);S.lairBorderMesh=null}
  // Restore east gate if it was opened
  if(S.eastGateOpen&&!S.eastGateMesh){
    const wm=new THREE.MeshStandardMaterial({color:0x667788,roughness:.8});
    const gb=new THREE.Mesh(new THREE.BoxGeometry(.6,3,3),wm);
    gb.position.set(10,1.25,C.BASE_Z);gb.castShadow=true;scene.add(gb);
    S.eastGateMesh=gb;S.eastGateOpen=false;
  }
  S.dragons.forEach(d=>scene.remove(d.mesh));S.dragons=[];
  S.goldBars.forEach(g=>scene.remove(g.mesh));S.goldBars=[];
  S.particles=[];S.projectiles.forEach(p=>scene.remove(p.mesh));S.projectiles=[];
  heroGroup.position.set(0,0,C.BASE_Z);
  cam.position.set(0,18,C.BASE_Z+16);cam.lookAt(0,0,C.BASE_Z);// Reset camera to top-down
  heroBow.scale.setScalar(1);heroBow.userData.bowMesh.material.color.setHex(0x885522);
  heroBow.userData.bowMesh.material.emissiveIntensity=0;
  updateBackpack();updateGoldUI();
  // Reset zone progress visuals
  drainTimer=0;
  updateBarFill(wFillMesh,0,S.wStation.x,S.wStation.z);
  updateBarFill(dFillMesh,0,S.dStation.x,S.dStation.z);
  updateProgressSprite(wProgSprite,0,C.BOW[1].cost);
  // Hide dragon zone and arrow
  if(S.dZoneGroup)S.dZoneGroup.visible=false;
  if(S.dStationArrow)S.dStationArrow.visible=false;
  $('victory').classList.remove('v');$('boss-info').classList.remove('v');
  $('tut-wrap').style.display='';
}

// === MAIN LOOP ===
function update(){
  requestAnimationFrame(update);
  if(S.gameOver){renderer.render(scene,cam);return}
  const dt=Math.min(clock.getDelta(),.05);
  // Movement
  let mx=0,mz=0;
  if(keys.a)mx-=1;if(keys.d)mx+=1;if(keys.w)mz-=1;if(keys.s)mz+=1;
  mx+=joyVec.x;mz+=joyVec.y;
  const ml=Math.sqrt(mx*mx+mz*mz);
  if(ml>.1&&S.tutDone){mx/=ml;mz/=ml;
    heroGroup.position.x+=mx*C.HERO_SPEED*dt;
    heroGroup.position.z+=mz*C.HERO_SPEED*dt;
    heroGroup.rotation.y=Math.atan2(mx,mz)+Math.PI;
    // Wall collision: 6 solid AABB segments, push hero out on overlap
    // Walls: E(x=10), W(x=-10) full; N(z=-8) two halves; S(z=+8) two halves
    // Each wall: [centerX, centerZ, halfW, halfD] (width along x, depth along z)
    const R=.4;// hero radius
    const walls=[
      [-10, 0, .3, 8],   // West wall
      [-6.5,-8, 3.5,.3],// North-left wall
      [ 6.5,-8, 3.5,.3],// North-right wall
      [-6.5, 8, 3.5,.3],// South-left wall
      [ 6.5, 8, 3.5,.3] // South-right wall
    ];
    // East wall: full if gate closed, two halves if open
    if(!S.eastGateOpen){
      walls.push([10, 0, .3, 8]);// East full wall
    }else{
      walls.push([10, -4.75, .3, 3.25]);// East top half
      walls.push([10, 4.75, .3, 3.25]);// East bottom half
    }
    let hx=heroGroup.position.x,hz=heroGroup.position.z;
    for(const[wx,wz,whx,whz] of walls){
      const ox=Math.abs(hx-wx)-(whx+R),oz=Math.abs(hz-wz)-(whz+R);
      if(ox<0&&oz<0){// overlapping this wall
        if(ox>oz){// push out along x (smaller overlap)
          hx+=hx>wx?-ox:ox;
        }else{// push out along z
          hz+=hz>wz?-oz:oz;
        }
      }
    }
    heroGroup.position.x=Math.max(-30,Math.min(30,hx));
    heroGroup.position.z=Math.max(C.BASE_Z-C.BOSS_DIST-8,Math.min(C.BASE_Z+C.BOSS_DIST+8,hz));
  }
  // Hero bob
  heroGroup.position.y=Math.abs(Math.sin(Date.now()*.008))*.12*(ml>.1?1:0);
  // Camera follow (skip during cinematic — riseAnim handles camera)
  if(S.phase!=='cinematic'){
    cam.position.x+=(heroGroup.position.x-cam.position.x)*dt*3;
    cam.position.z+=(heroGroup.position.z+20-cam.position.z)*dt*3;
    cam.lookAt(heroGroup.position.x,0,heroGroup.position.z);
  }
  // Shake
  if(S.shakeT>0){S.shakeT-=dt;cam.position.x+=(Math.random()-.5)*.5;cam.position.y+=(Math.random()-.5)*.3}
  // Systems
  if(S.phase==='fight'){heroAttack(dt);bossAI(dt)}
  if(S.phase!=='cinematic'){pickupGold();drainStations(dt);}
  updateGoldBars(dt);updateDragons(dt);updateParticles(dt);updateProjectiles(dt);
  // Flames
  scene.traverse(o=>{if(o.userData&&o.userData.flame)o.scale.setScalar(.8+Math.sin(Date.now()*.01+o.id)*.3)});
  // Arrow bounce animation
  if(S.dStationArrow&&S.dStationArrow.visible)S.dStationArrow.position.y=3+Math.sin(Date.now()*.005)*.5;
  // Hide dragon station text when waiting for egg but no egg available
  if(S.dStation.phase==='wait_egg'&&S.zoneCooldown<=0){
    const hasEgg=S.carryingEgg||S.droppedEggs.length>0;
    dProgSprite.visible=hasEgg;
  }
  updateLabels();
  renderer.render(scene,cam);
}

init();update();
</script>
